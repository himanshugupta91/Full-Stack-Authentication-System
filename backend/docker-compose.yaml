services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in backend/.env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: auth-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: auth-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  app:
    build: .
    container_name: auth-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DOCKER_SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/auth_db}
      SPRING_DATASOURCE_USERNAME: ${DOCKER_SPRING_DATASOURCE_USERNAME:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in backend/.env}
      SPRING_DATA_REDIS_HOST: ${DOCKER_SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${DOCKER_SPRING_DATA_REDIS_PORT:-6379}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      APP_FRONTEND_RESET_PASSWORD_URL: ${APP_FRONTEND_RESET_PASSWORD_URL:-http://localhost:5173/reset-password}
      APP_BACKEND_URL: ${APP_BACKEND_URL:-http://localhost:8080}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,https://authsystem-plum.vercel.app}
      AUTH_REFRESH_TOKEN_COOKIE_NAME: ${AUTH_REFRESH_TOKEN_COOKIE_NAME:-refreshToken}
      AUTH_REFRESH_TOKEN_COOKIE_PATH: ${AUTH_REFRESH_TOKEN_COOKIE_PATH:-/api/v1/auth}
      AUTH_REFRESH_TOKEN_COOKIE_SECURE: ${AUTH_REFRESH_TOKEN_COOKIE_SECURE:-auto}
      AUTH_REFRESH_TOKEN_COOKIE_SAME_SITE: ${AUTH_REFRESH_TOKEN_COOKIE_SAME_SITE:-auto}
      AUTH_REFRESH_TOKEN_COOKIE_DOMAIN: ${AUTH_REFRESH_TOKEN_COOKIE_DOMAIN:-}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in backend/.env}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-disabled}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-disabled}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-disabled}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-disabled}
      OAUTH_APPLE_CLIENT_ID: ${OAUTH_APPLE_CLIENT_ID:-disabled}
      OAUTH_APPLE_CLIENT_SECRET: ${OAUTH_APPLE_CLIENT_SECRET:-disabled}
      OAUTH_LINKEDIN_CLIENT_ID: ${OAUTH_LINKEDIN_CLIENT_ID:-disabled}
      OAUTH_LINKEDIN_CLIENT_SECRET: ${OAUTH_LINKEDIN_CLIENT_SECRET:-disabled}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-http://localhost:8080/api/v1}
        VITE_OAUTH_BASE_URL: ${FRONTEND_VITE_OAUTH_BASE_URL:-http://localhost:8080}
    container_name: auth-frontend
    ports:
      - "5173:80"
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
